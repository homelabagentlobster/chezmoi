charging_symbol = "َ°‚„ "
discharging_symbol = "َ°‚ƒ "
unknown_symbol = "َ°‚‘ "
empty_symbol = "َ°‚ژ "
format = "[î‚¶](fg:purple bg:mantle)[$symbol$percentage]($style)[î‚´](fg:purple)"

[[battery.display]]
