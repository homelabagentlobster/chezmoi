time_format = "%H:%M"
utc_time_offset = "+12"
style = "fg:crust bg:cyan"
format = "[î‚¶](fg:cyan bg:mantle)[ïگ؛ $time ](fg:crust bg:cyan)[î‚´](fg:cyan)"

[cmd_duration]
show_milliseconds = false
format = "[î‚¶](fg:mantle bg:mantle)[ï‰’ $duration](fg:orange bg:mantle)[î‚´](fg:mantle bg:mantle)"
style = "fg:orange bg:mantle"
disabled = false
show_notifications = true
min_time_to_notify = 100

[status]
disabled = false
map_symbol = true
symbol = "[î‚¶](fg:red)[âœک](fg:crust bg:red)[î‚´](fg:red bg:mantle)"
success_symbol = "[î‚¶](fg:green)[âœ“](fg:crust bg:green)[î‚´](fg:green bg:mantle)"
not_executable_symbol = "[î‚¶](fg:yellow)[ ïپ± ](fg:crust bg:yellow)[î‚´](fg:yellow bg:mantle)"
not_found_symbol = "[î‚¶](fg:yellow)[ ? ](fg:crust bg:yellow)[î‚´](fg:yellow bg:mantle)"
sigint_symbol = "[î‚¶](fg:yellow)[ َ°œ؛ ](fg:crust bg:yellow)[î‚´](fg:yellow bg:mantle)"
signal_symbol = "[î‚¶](fg:yellow)[ َ±گ‹ ](fg:crust bg:yellow)[î‚´](fg:yellow bg:mantle)"
style = "fg:text bg:comment"
success_style = "fg:crust bg:green"
failure_style = "fg:crust bg:red"
format = "$symbol"
recognize_signal_code = true
pipestatus = true
pipestatus_separator = "[|](fg:comment bg:mantle)"
pipestatus_segment_format = "$symbol"
pipestatus_format = "$pipestatus"

[custom.dir_end]
when = "! git rev-parse --is-inside-work-tree > /dev/null 2>&1"
format = "[î‚´](fg:green)"
