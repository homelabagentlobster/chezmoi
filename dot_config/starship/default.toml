"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """[î‚¶](fg:orange)$username[î‚´](fg:orange bg:green)$directory$custom\
($git_branch$git_status)\
($c$cpp$rust$golang$nodejs$php$java$kotlin$haskell$python$docker_context$conda$pixi)
$character"""

right_format = "$status$cmd_duration$time"
