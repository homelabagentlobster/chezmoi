format = "[î‚´](bg:purple fg:green)[ $symbol $branch ]($style)"

[git_status]
style = "fg:crust bg:purple"
format = "[$all_status$ahead_behind]($style)[î‚´](fg:purple)"
ahead = "â‡،${count} "
behind = "â‡£${count} "
